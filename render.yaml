services:
  # Single service — Express serves both the API and the built React frontend
  - type: web
    name: trading-bot
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: bash scripts/render-build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: trading-bot-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false

databases:
  - name: trading-bot-db
    region: oregon
    plan: free
    databaseName: trading_bot
    user: trading_bot
